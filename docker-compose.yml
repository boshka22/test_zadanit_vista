
services:
  db:
    image: postgres:16-alpine
    container_name: diary-postgres
    environment:
      POSTGRES_DB: diary_db
      POSTGRES_USER: diary_user
      POSTGRES_PASSWORD: diary_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    container_name: diary-app
    depends_on:
      - db
    restart: on-failure
    environment:
      DATABASE_URL: postgresql+asyncpg://diary_user:diary_password@db:5432/diary_db
    ports:
      - "8000:8000"
    command: >
      uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:

